name: Auto PR

on:
  workflow_run:
    workflows:
      - "dbt CI"
      - "Ingestion CI/CD"
    branches:
      - feature/develop
    types:
      - completed

permissions:
  pull-requests: write
  contents: read

jobs:
  open-pr:
    name: Open PR to main
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head feature/develop --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head feature/develop \
              --title "feat: merge feature/develop → main" \
              --body "PR aberta automaticamente após CI verde em \`feature/develop\`."
            echo "PR criada com sucesso."
          else
            echo "PR #$EXISTING já existe. Nenhuma ação necessária."
          fi
