name: Ingestion CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - "ingestion/**"
      - ".github/workflows/ingestion-ci.yml"
  push:
    branches: [main]
    paths:
      - "ingestion/**"
      - ".github/workflows/ingestion-ci.yml"

env:
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/manutbr-ingestion
  CLOUD_RUN_SERVICE: manutbr-ingestion
  CLOUD_RUN_REGION: us-central1

jobs:
  # ── 1. Lint + unit tests ─────────────────────────────────────────────────────
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check ingestion/

  # ── 2. Build & push Docker image ─────────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    # only build/push when merging to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            ingestion/
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── 3. Deploy to Cloud Run ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.CLOUD_RUN_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
